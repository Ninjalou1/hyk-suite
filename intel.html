<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HYK Intelligence Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#030311;--s1:#07071C;--s2:#0B0B26;--s3:#10103A;
  --gold:#C9A84C;--g2:#E8C568;
  --cy:#00CFFF;--gn:#00E59B;--rd:#FF3355;--or:#FF8C42;--pu:#9B72FF;--bl:#4A9EFF;
  --tx:#D8E8FF;--mu:rgba(150,180,255,.45);--dm:rgba(150,180,255,.10);--bd:rgba(0,207,255,.07);
  --r:11px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;font-size:12px}
#app{display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;padding:0 18px;height:50px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;gap:14px}
.logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:var(--gold);letter-spacing:.16em;white-space:nowrap;flex-shrink:0}
.logo em{font-style:normal;font-family:'Inter',sans-serif;font-size:9px;font-weight:500;color:var(--mu);margin-left:8px;letter-spacing:.04em}
.tabs{display:flex;gap:2px;background:var(--s2);padding:3px;border-radius:var(--rs);flex-shrink:0}
.tab{padding:5px 11px;border:none;background:none;color:var(--mu);font-size:9px;font-weight:800;cursor:pointer;border-radius:5px;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab.active{background:rgba(0,207,255,.13);color:var(--cy);border:1px solid rgba(0,207,255,.22)}
.hdr-r{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.sdots{display:flex;gap:5px;align-items:center}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sd-ok{background:var(--gn);animation:pg 2.5s infinite}
.sd-err{background:var(--rd)}
.sd-ld{background:var(--or);animation:po .9s infinite}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes po{0%,100%{opacity:1}50%{opacity:.2}}
.hdr-clock{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-align:right}
.hdr-date{font-size:9px;color:var(--mu);letter-spacing:.03em;text-align:right;margin-top:1px}
.rbtn{padding:4px 9px;background:rgba(0,207,255,.06);border:1px solid rgba(0,207,255,.18);border-radius:var(--rs);color:var(--cy);font-size:9px;font-weight:800;cursor:pointer;letter-spacing:.05em;transition:all .15s}
.rbtn:hover{background:rgba(0,207,255,.14)}
.rbtn.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes xio-pulse{0%,100%{box-shadow:0 0 8px rgba(255,107,157,.3)}50%{box-shadow:0 0 18px rgba(255,107,157,.6)}}
@keyframes xio-speak{0%,100%{box-shadow:0 0 4px rgba(255,107,157,.5),0 0 0 0 rgba(255,107,157,.4)}50%{box-shadow:0 0 10px rgba(255,107,157,.8),0 0 12px 4px rgba(255,107,157,.2)}}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dm);border-radius:2px}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px}
.ct{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.ctd{width:5px;height:5px;border-radius:50%;background:var(--cy);flex-shrink:0}
.div{height:1px;background:var(--bd);margin:9px 0}

/* ── GRID HELPERS ── */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g2-3{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}

/* ── BADGES ── */
.b{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:.03em;white-space:nowrap}
.b-gn{background:rgba(0,229,155,.1);color:var(--gn);border:1px solid rgba(0,229,155,.22)}
.b-rd{background:rgba(255,51,85,.1);color:var(--rd);border:1px solid rgba(255,51,85,.22)}
.b-or{background:rgba(255,140,66,.1);color:var(--or);border:1px solid rgba(255,140,66,.22)}
.b-cy{background:rgba(0,207,255,.08);color:var(--cy);border:1px solid rgba(0,207,255,.18)}
.b-pu{background:rgba(155,114,255,.08);color:var(--pu);border:1px solid rgba(155,114,255,.18)}
.b-gd{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.22)}

/* ── CRYPTO ROWS ── */
.cr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--dm)}
.cr:last-child{border-bottom:none}
.cr-sym{font-family:'Orbitron',monospace;font-size:9px;font-weight:900;color:var(--cy);width:32px;flex-shrink:0}
.cr-name{color:var(--mu);font-size:9px;flex:1;min-width:0}
.cr-px{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;flex-shrink:0}
.cr-ch{font-size:9px;font-weight:700;width:46px;text-align:right;flex-shrink:0}
.up{color:var(--gn)}.dn{color:var(--rd)}

/* ── NEWS ── */
.ni{padding:7px 0;border-bottom:1px solid var(--dm);cursor:pointer;transition:all .1s}
.ni:last-child{border-bottom:none}
.ni:hover .ni-t{color:var(--cy)}
.ni-ts{font-size:9px;color:var(--mu);margin-bottom:3px}
.ni-t{font-size:11px;font-weight:600;line-height:1.4;color:var(--tx);transition:color .15s}
.ni-d{font-size:10px;color:var(--mu);margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── TOOL BUTTONS ── */
.tb{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--s2);border:1px solid var(--dm);border-radius:var(--rs);cursor:pointer;transition:all .15s;width:100%;text-align:left;font-family:'Inter',sans-serif;margin-bottom:5px}
.tb:last-child{margin-bottom:0}
.tb:hover{border-color:rgba(0,207,255,.3);background:var(--s3)}
.tb-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.tb-name{font-size:11px;font-weight:700;color:var(--tx);margin-bottom:1px}
.tb-desc{font-size:9px;color:var(--mu)}
.tb-arrow{color:var(--mu);margin-left:auto;font-size:12px;flex-shrink:0}

/* ── WEATHER ── */
.wx-main{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.wx-icon{font-size:40px;line-height:1}
.wx-temp{font-family:'Orbitron',monospace;font-size:34px;font-weight:900}
.wx-cond{font-size:10px;color:var(--mu);margin-top:2px}
.wx-row{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid var(--dm)}
.wx-row:last-child{border-bottom:none}
.wx-lbl{color:var(--mu)}

/* ── FEAR GREED ── */
.fg-wrap{display:flex;flex-direction:column;align-items:center}

/* ── COL CARD ── */
.col-c{padding:10px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--dm);cursor:default}
.col-hd{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.col-flag{font-size:15px}
.col-city{font-weight:700;font-size:11px}
.col-total{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:var(--gold);margin-bottom:3px}
.col-row{display:flex;justify-content:space-between;font-size:9px;color:var(--mu);padding:2px 0}

/* ── REGION CARDS ── */
.rgn{padding:10px 11px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--dm);cursor:pointer;transition:all .15s;margin-bottom:6px}
.rgn:hover{border-color:rgba(0,207,255,.3);background:var(--s3)}
.rgn:last-child{margin-bottom:0}
.rgn-hd{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.rgn-name{font-weight:700;font-size:11px}
.rgn-tags{display:flex;gap:4px;flex-wrap:wrap}
.rgn-desc{font-size:9px;color:var(--mu);line-height:1.5;margin-top:4px}

/* ── JOB LINKS ── */
.jcat{margin-bottom:14px}
.jcat-t{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.jl{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--dm);cursor:pointer;transition:all .15s;font-size:11px;margin-bottom:3px}
.jl:last-child{margin-bottom:0}
.jl:hover{border-color:rgba(0,207,255,.28);background:var(--s3)}
.jl-name{font-weight:600;color:var(--tx)}
.jl-tag{font-size:9px;color:var(--mu)}

/* ── SHIMMER ── */
.sh{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── SECTION LABEL ── */
.sec{display:flex;align-items:center;gap:8px;margin:10px 0 8px}
.sec span{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);white-space:nowrap}
.sec::before,.sec::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── SKILL CHIPS ── */
.skill-grid{display:flex;flex-wrap:wrap;gap:6px}
.sk{padding:5px 10px;background:var(--s2);border:1px solid var(--dm);border-radius:20px;font-size:10px;font-weight:600;color:var(--tx);display:flex;align-items:center;gap:5px}
.sk-hot{border-color:rgba(255,140,66,.3);color:var(--or)}
.sk-fire{border-color:rgba(255,51,85,.3);color:var(--rd)}

/* ── PROGRESS BAR ── */
.pb{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin:4px 0}
.pbf{height:100%;border-radius:3px;transition:width .4s}

/* ── GEO MAP ── */
#geo-map{width:100%;height:420px;background:var(--s2)}
.leaflet-tile-pane{filter:brightness(.55) invert(1) contrast(1.5) hue-rotate(200deg) saturate(.5)}
.leaflet-container{background:#020210!important;cursor:crosshair!important}
.leaflet-control-zoom a{background:var(--s2)!important;color:var(--cy)!important;border-color:var(--bd)!important;font-size:14px!important}
.leaflet-control-zoom{border:1px solid var(--bd)!important}
.leaflet-popup-content-wrapper{background:var(--s1)!important;color:var(--tx)!important;border:1px solid var(--bd)!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important;border-radius:var(--rs)!important;font-family:'Inter',sans-serif!important;font-size:11px!important}
.leaflet-popup-tip{background:var(--s1)!important}
/* ── ENTERTAINMENT / LOUNGE ── */
.ent-cat-btn{padding:9px 14px;border:none;border-bottom:3px solid transparent;background:transparent;color:rgba(255,255,255,.38);font-size:9.5px;font-weight:800;cursor:pointer;white-space:nowrap;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;flex-shrink:0}
.ent-cat-btn:hover{color:rgba(201,168,76,.75);background:rgba(201,168,76,.04)}
.ent-cat-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.07)}
.ent-card{background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:6px;overflow:hidden;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease,border-color .18s;display:flex;flex-direction:column}
.ent-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.55),0 0 0 1px rgba(201,168,76,.2);border-color:rgba(201,168,76,.22)}
.ent-hero{background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:6px;overflow:hidden;cursor:pointer;transition:box-shadow .18s,border-color .18s}
.ent-hero:hover{box-shadow:0 6px 22px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.26);border-color:rgba(201,168,76,.28)}
.ent-story{display:flex;gap:10px;padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .12s}
.ent-story:hover{background:rgba(201,168,76,.05)}
.ent-story:last-child{border-bottom:none}
@keyframes lounge-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ent-card{animation:lounge-in .25s ease both}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{size:A4;margin:10mm}
  body{background:#fff!important;overflow:visible!important}
  #app{height:auto!important;overflow:visible!important}
  .hdr{background:#f5f5f5!important;-webkit-print-color-adjust:exact!important}
  .tabs,.rbtn{display:none!important}
  .main{overflow:visible!important;display:block!important;padding:10px!important}
  .card{background:#fff!important;border:1px solid #ddd!important;margin-bottom:12px!important;break-inside:avoid}
}
</style>
</head>

// ── API ────────────────────────────────────────────────────────────────────────
async function get(url, ms=9000) {
  const c = new AbortController();
  const t = setTimeout(()=>c.abort(), ms);
  try { const r = await fetch(url, {signal:c.signal}); clearTimeout(t); return r.json(); }
  catch(e){ clearTimeout(t); throw e; }
}

// ── ENTERTAINMENT ─────────────────────────────────────────────────────────────
const entCache = {};
const ENT_CACHE_MS = 10 * 60 * 1000;

function entThumb(link, thumb) {
  if(thumb) return thumb;
  try { return 'https://logo.clearbit.com/' + new URL(link).hostname.replace('www.',''); }
  catch { return ''; }
}

function parseXMLFeed(xml, fallbackSrc) {
  try {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    if(doc.querySelector('parsererror')) return [];
    const els = [...doc.querySelectorAll('channel > item, feed > entry')];
    return els.map(el => {
      const txt = s => el.querySelector(s)?.textContent?.trim()||'';
      const title   = txt('title').replace(/ - [A-Z][^-]{2,40}$/,'').trim();
      const link    = txt('link') || el.querySelector('link')?.getAttribute('href')||'';
      const desc    = (txt('description')||txt('summary')).replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim().slice(0,160);
      const pubDate = txt('pubDate')||txt('updated')||txt('published');
      const author  = txt('source')||txt('author')||txt('creator')||fallbackSrc;
      const encUrl  = el.querySelector('enclosure')?.getAttribute('url')||'';
      const medThumb= el.getElementsByTagNameNS('http://search.yahoo.com/mrss/','thumbnail')[0]?.getAttribute('url')||'';
      const imgMatch= (txt('description')||txt('content')).match(/src=["']([^"']+\.(?:jpg|jpeg|png|webp))[^"']*["']/i);
      const thumbnail = encUrl||medThumb||(imgMatch?imgMatch[1]:'')||'';
      return {title,link,description:desc,pubDate,author,thumbnail};
    }).filter(n=>n.title&&n.link);
  } catch { return []; }
}

async function fetchEntCat(id) {
  const cat = ENT_CATS.find(c=>c.id===id);
  if(!cat) return;
  const cached = entCache[id];
  if(cached && (Date.now()-cached.ts < ENT_CACHE_MS)) {
    S.entItems=cached.items; S.entLoading=false; S.entErr=false; updateEntGrid(); return;
  }
  S.entLoading=true; S.entErr=false; S.entItems=[]; S.entDbg=''; updateEntGrid();

  let items=[], lastErr='';

  async function tryFetch(url) {
    // rss2json — converts XML to JSON, includes thumbnails from media: tags
    try {
      const d = await get('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(url)+'&count=20', 10000);
      if(d.status!=='error' && d.items?.length) {
        return d.items.filter(n=>n.title&&n.link).map(n=>({
          title:(n.title||'').replace(/ - [A-Z][^-]{2,40}$/,'').trim(),
          link:n.link, description:(n.description||'').replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim().slice(0,160),
          pubDate:n.pubDate||'', author:n.author||n.source||cat.src,
          thumbnail:n.thumbnail||n.enclosure?.link||'',
        }));
      }
    } catch {}
    // corsproxy.io — raw XML
    try {
      const c=new AbortController(), t=setTimeout(()=>c.abort(),10000);
      const r=await fetch('https://corsproxy.io/?'+url,{signal:c.signal});
      clearTimeout(t);
      const parsed=parseXMLFeed(await r.text(),cat.src);
      if(parsed.length) return parsed;
    } catch {}
    // allorigins — encoded
    try {
      const c=new AbortController(), t=setTimeout(()=>c.abort(),10000);
      const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url),{signal:c.signal});
      clearTimeout(t);
      const parsed=parseXMLFeed(await r.text(),cat.src);
      if(parsed.length) return parsed;
    } catch {}
    return [];
  }

  // 1. Direct source feed — has thumbnails/images
  if(cat.feed) { items = await tryFetch(cat.feed); lastErr = items.length ? '' : 'feed:empty'; }

  // 2. Google News fallback — no images but reliable
  if(!items.length && cat.gnews) { items = await tryFetch(cat.gnews); lastErr = items.length ? '' : 'gnews:empty'; }

  items = items.slice(0,18);
  if(!items.length){S.entErr=true;S.entDbg=lastErr;S.entItems=[];delete entCache[id];}
  else{entCache[id]={ts:Date.now(),items};S.entItems=items;S.entErr=false;S.entDbg='';}
  S.entLoading=false; updateEntGrid();
}

const FX_CURRENCIES = ['EUR','USD','CAD','GBP','JPY','AUD','CHF','CNY','HKD','KRW','SGD','MXN','BRL','INR','THB','MYR','IDR','PHP','HUF','CZK','PLN','TRY','ZAR','NOK','SEK','DKK','NZD','RON'];
const FX_SYM  = {EUR:'€',USD:'$',CAD:'C$',GBP:'£',JPY:'¥',AUD:'A$',CHF:'Fr',CNY:'¥',HKD:'HK$',KRW:'₩',SGD:'S$',MXN:'$',BRL:'R$',INR:'₹',THB:'฿',MYR:'RM',IDR:'Rp',PHP:'₱',HUF:'Ft',CZK:'Kč',PLN:'zł',TRY:'₺',ZAR:'R',NOK:'kr',SEK:'kr',DKK:'kr',NZD:'NZ$',RON:'lei'};
const FX_FLAG = {EUR:'🇪🇺',USD:'🇺🇸',CAD:'🇨🇦',GBP:'🇬🇧',JPY:'🇯🇵',AUD:'🇦🇺',CHF:'🇨🇭',CNY:'🇨🇳',HKD:'🇭🇰',KRW:'🇰🇷',SGD:'🇸🇬',MXN:'🇲🇽',BRL:'🇧🇷',INR:'🇮🇳',THB:'🇹🇭',MYR:'🇲🇾',IDR:'🇮🇩',PHP:'🇵🇭',HUF:'🇭🇺',CZK:'🇨🇿',PLN:'🇵🇱',TRY:'🇹🇷',ZAR:'🇿🇦',NOK:'🇳🇴',SEK:'🇸🇪',DKK:'🇩🇰',NZD:'🇳🇿',RON:'🇷🇴'};
const FX_BOARD = ['USD','EUR','GBP','JPY','AUD','CHF','CNY','KRW','HKD','SGD','THB','MYR','INR','BRL','MXN','ZAR','NOK','SEK','DKK','NZD','PLN','CZK','HUF','TRY'];
const FX_DISP_QUICK = ['CAD','USD','EUR','GBP','JPY','THB','BRL','MXN'];

async function fetchFX() {
  // CDN-hosted APIs with permissive CORS — both work from file:// origin
  const URLS = [
    'https://latest.currency-api.pages.dev/v1/currencies/eur.json',
    'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json',
  ];
  for(const url of URLS) {
    try {
      const d = await get(url, 8000);
      const raw = d?.eur;
      if(!raw || typeof raw !== 'object') continue;
      const rates = {};
      for(const [k,v] of Object.entries(raw)) rates[k.toUpperCase()] = v;
      rates['EUR'] = 1.0;
      S.fx.rates = rates;
      S.fx.date  = d.date || '';
      updateFXBoard();
      updateCityPrices();
      return;
    } catch(e) { /* try next URL */ }
  }
  const el = document.getElementById('fx-board');
  if(el) el.innerHTML = `<div style="color:var(--rd);font-size:10px;text-align:center;padding:14px">Rates unavailable — check connection</div>`;
}

// Convert `amount` from currency `a` to `b` using EUR-base rates
function fxConvert(amount, a, b) {
  if(!S.fx.rates || !amount) return null;
  const ra = a === 'EUR' ? 1 : S.fx.rates[a];
  const rb = b === 'EUR' ? 1 : S.fx.rates[b];
  if(!ra || !rb) return null;
  return amount * (rb / ra);
}

function fmtFX(val, cur) {
  if(val === null || isNaN(val)) return '—';
  const noDecimal = ['JPY','KRW','IDR','HUF'];
  return noDecimal.includes(cur)
    ? Math.round(val).toLocaleString('en-US')
    : val.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
}

function updateFXBoard() {
  const el = document.getElementById('fx-board');
  if(!el) return;
  const from = S.fx.boardFrom;
  const amt  = parseFloat(S.fx.boardAmt) || 0;
  if(!S.fx.rates) {
    el.innerHTML = `<div style="text-align:center;color:var(--mu);font-size:10px;padding:16px">⟳ Loading live rates…</div>`;
    return;
  }
  if(!amt) {
    el.innerHTML = `<div style="text-align:center;color:var(--mu);font-size:10px;padding:14px">Enter an amount above</div>`;
    return;
  }
  el.innerHTML = FX_BOARD.filter(c=>c!==from).map(to => {
    const val  = fxConvert(amt, from, to);
    const sym  = FX_SYM[to]  || to;
    const flag = FX_FLAG[to] || '';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-bottom:1px solid var(--bd)">
      <span style="display:flex;align-items:center;gap:5px;min-width:72px">
        <span style="font-size:13px;line-height:1">${flag}</span>
        <span style="font-size:9px;font-weight:800;color:var(--mu);letter-spacing:.04em">${to}</span>
      </span>
      <span style="font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--tx)">${sym} ${fmtFX(val, to)}</span>
    </div>`;
  }).join('');
}

function fmtCity(cad) {
  const dc  = S.fx.displayCur;
  const sym = FX_SYM[dc] || dc;
  if(dc === 'CAD' || !S.fx.rates) return `${sym}${cad.toLocaleString()}`;
  const v = fxConvert(cad, 'CAD', dc);
  return v !== null ? `${sym}${Math.round(v).toLocaleString()}` : `C$${cad.toLocaleString()}`;
}

    <div class="col-row"><span>💑 Dating/mo</span><span style="color:#FF6B9D;font-weight:700">~${fmtCity(c.dating)}</span></div>
    <div class="col-row"><span>Internet</span><span style="color:var(--tx)">${c.internet}</span></div>
    <div class="col-row"><span>Safety</span><span style="color:${c.safety==='Very Safe'?'var(--gn)':c.safety==='Safe'?'var(--bl)':c.safety==='Moderate'?'var(--or)':'var(--rd)'}">${c.safety}</span></div>
    <div class="col-row"><span>Climate</span><span style="color:var(--tx)">${c.climate}</span></div>
  </div>`;
}

function renderCityContent() {
  const allCities = [...CITIES, ...S.customCities].sort((a,b)=>a.total-b.total);
  const budget = S.travelBudget || 0;
  const noteBar = `<div style="margin-top:10px;padding:9px 11px;background:rgba(255,107,157,.05);border:1px solid rgba(255,107,157,.15);border-radius:var(--rs);font-size:9px;color:var(--mu);line-height:1.7">
    💑 <b style="color:#FF6B9D">Dating budget</b> covers: 2 dinner dates/week + weekend activities + occasional gift + local transport. Based on local price levels × 1.37 CAD.<br>
    💱 City costs in CAD · display currency converts at live ECB rates${S.fx.date?' ('+S.fx.date+')':''}
  </div>`;

  if(!budget) {
    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${allCities.map(cityCard).join('')}</div>${noteBar}`;
  }

  // ── Tier list mode ──
  const TIERS = [
    { id:'S', color:'var(--gn)',  bg:'rgba(0,229,155,.07)',  bd:'rgba(0,229,155,.22)',  min:1.5,       desc:'Comfortable — 50%+ surplus' },
    { id:'A', color:'var(--cy)',  bg:'rgba(0,207,255,.06)',  bd:'rgba(0,207,255,.18)',  min:1.2,       desc:'Fits well — 20–49% surplus' },
    { id:'B', color:'var(--gold)',bg:'rgba(201,168,76,.06)', bd:'rgba(201,168,76,.18)', min:1.0,       desc:'On budget — 0–19% surplus'  },
    { id:'C', color:'var(--or)', bg:'rgba(255,140,66,.06)', bd:'rgba(255,140,66,.18)', min:0.7,       desc:'Tight — covers 70–99%'       },
    { id:'D', color:'var(--rd)', bg:'rgba(255,51,85,.06)',  bd:'rgba(255,51,85,.18)',  min:0,         desc:'Over budget — under 70%'    },
  ];
  const cutoffs = [1.5, 1.2, 1.0, 0.7, 0];

  const withinBudget = allCities.filter(c=>{ const b=MU_BONUS[getMUTier(c.country)]||1; return budget*b>=c.total; }).length;
  const summary = `<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;padding:7px 10px;background:rgba(0,207,255,.04);border:1px solid rgba(0,207,255,.12);border-radius:var(--rs);font-size:9px;flex-wrap:wrap">
    <span>Monthly budget: <b style="color:var(--cy);font-family:'Orbitron',monospace">${fmtCity(budget)}</b></span>
    <span>·</span>
    <span style="color:var(--gn)">✓ <b>${withinBudget}</b> cities within budget</span>
    <span>·</span>
    <span style="color:var(--rd)">✕ <b>${allCities.length - withinBudget}</b> over budget</span>
  </div>`;

  const tierRows = TIERS.map((t,ti) => {
    const maxR = ti === 0 ? Infinity : cutoffs[ti-1];
    const cities = allCities.filter(c => {
      const muT = getMUTier(c.country);
      const bonus = MU_BONUS[muT] || 1.0;
      const r = (budget * bonus) / c.total;
      return r >= t.min && r < maxR;
    });
    const chips = cities.map(c => {
      const muT = getMUTier(c.country);
      const bonus = MU_BONUS[muT] || 1.0;
      const effectiveRatio = (budget * bonus) / c.total;
      const months = effectiveRatio.toFixed(1);
      const muColor = muT==='S'?'var(--gn)':muT==='A'?'var(--cy)':muT==='B'?'var(--gold)':'var(--or)';
      const muChip = muT ? `<div style="font-size:7px;color:${muColor};font-weight:800;letter-spacing:.2px">🌹${muT} +${Math.round((bonus-1)*100)}%</div>` : '';
      return `<div style="padding:6px 9px;background:var(--s2);border:1px solid ${muT?'rgba(255,107,157,.22)':'var(--bd)'};border-radius:var(--rs);display:flex;flex-direction:column;gap:2px;min-width:88px">
        <div style="font-size:10px;font-weight:700">${c.flag} ${c.city}</div>
        <div style="font-size:8px;color:var(--mu)">${fmtCity(c.total)}/mo</div>
        <div style="font-size:9px;color:${t.color};font-weight:800">${months}mo runway</div>
        ${muChip}
      </div>`;
    }).join('');
    return `<div style="display:flex;margin-bottom:5px;min-height:44px">
      <div style="width:30px;background:${t.color};display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:15px;color:#030311;border-radius:var(--rs) 0 0 var(--rs);flex-shrink:0">${t.id}</div>
      <div style="flex:1;background:${t.bg};border:1px solid ${t.bd};border-left:none;border-radius:0 var(--rs) var(--rs) 0;${cities.length?'display:flex;flex-wrap:wrap;gap:4px;padding:5px;align-content:center':'display:flex;align-items:center;padding:0 12px'}">
        ${cities.length ? chips : `<span style="font-size:9px;color:var(--mu);font-style:italic">${t.desc} — no cities here</span>`}
      </div>
    </div>`;
  }).join('');

  return summary + tierRows + noteBar;
}

function updateCityGrid() {
  const el = document.getElementById('city-tier-content');
  if(el) el.innerHTML = renderCityContent();
}

function updateCityPrices() { updateCityGrid(); }  // alias — grid re-renders with current displayCur

function setCityCur(c) {
  S.fx.displayCur = c;
  localStorage.setItem('hyk_fx_disp', c);
  updateCityGrid();
  const lbl = document.getElementById('fx-disp-label');
  if(lbl) lbl.textContent = c;
  document.querySelectorAll('.fx-cur-btn').forEach(b => {
    const active = b.dataset.cur === c;
    b.style.background = active ? 'rgba(0,207,255,.15)' : 'rgba(0,207,255,.04)';
    b.style.color       = active ? 'var(--cy)'           : 'var(--mu)';
    b.style.borderColor = active ? 'rgba(0,207,255,.3)'  : 'rgba(0,207,255,.1)';
  });
}

function getMUTier(country) { return MU_TIER[country] || null; }

let _csTimer = null;
let _dbResults = [];

function debounceCitySearch(q) {
  clearTimeout(_csTimer);
  const el = document.getElementById('cf-results');
  if(!el) return;
  if(q.length < 1) { el.innerHTML = ''; return; }
  _csTimer = setTimeout(() => localCitySearch(q), 200);
}

function localCitySearch(q) {
  const el = document.getElementById('cf-results');
  if(!el) return;
  const lq = q.toLowerCase();
  // Also search existing CITIES so they appear in autocomplete
  const allDB = [...CITY_DB, ...CITIES.filter(c=>c.city!=='Montréal')];
  _dbResults = allDB.filter(c =>
    c.city.toLowerCase().includes(lq) || c.country.toLowerCase().includes(lq)
  ).slice(0, 8);
  if(!_dbResults.length) {
    el.innerHTML = `<div style="padding:5px 8px;font-size:9px;color:var(--mu)">Not in database — fill fields manually below</div>`;
    document.getElementById('cf-fields').style.display = 'block';
    return;
  }
  el.innerHTML = `<div style="border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;margin-top:3px;box-shadow:0 6px 20px rgba(0,0,0,.5)">` +
    _dbResults.map((c,i) => `
      <div onclick="selectFromDB(${i})"
        onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background='var(--s2)'"
        style="padding:7px 10px;cursor:pointer;font-size:10px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
        <span>${c.flag} <b>${c.city}</b>, ${c.country}</span>
        <span style="font-size:8px;color:var(--mu)">${c.tag}</span>
      </div>`).join('') + `</div>`;
}

function selectFromDB(i) {
  const c = _dbResults[i];
  if(!c) return;
  // Fill search input
  const srch = document.getElementById('cf-search');
  if(srch) srch.value = `${c.city}, ${c.country}`;
  // Hide results
  const res = document.getElementById('cf-results');
  if(res) res.innerHTML = '';
  // Populate all fields instantly
  setV('cf-flag',    c.flag);
  setV('cf-city',    c.city);
  setV('cf-country', c.country);
  setV('cf-tag',     c.tag);
  setV('cf-studio',  c.studio);
  setV('cf-food',    c.food);
  setV('cf-dating',  c.dating);
  setV('cf-climate', c.climate);
  const inet = document.getElementById('cf-internet');
  if(inet) inet.value = c.internet;
  const safe = document.getElementById('cf-safety');
  if(safe) safe.value = c.safety;
  // Show fields + status
  document.getElementById('cf-fields').style.display = 'block';
  const st = document.getElementById('cf-status');
  if(st) st.innerHTML = `<span style="color:var(--gn)">✓ Auto-filled — studio, food, dating, safety, climate all set · review & adjust then save</span>`;
}

function setV(id, v) { const el = document.getElementById(id); if(el) el.value = v; }

function saveCityForm() {
  const v = id => document.getElementById(id)?.value;
  const city    = (v('cf-city')||'').trim();
  const country = (v('cf-country')||'').trim();
  if(!city || !country) { alert('City and Country are required.'); return; }
  const studio = parseInt(v('cf-studio')||0, 10) || 0;
  const food   = parseInt(v('cf-food')||0,   10) || 0;
  const dating = parseInt(v('cf-dating')||0, 10) || 0;
  S.customCities.push({
    flag:    (v('cf-flag')||'').trim() || '🏙️',
    city, country,
    tag:     (v('cf-tag')||'').trim() || 'Custom',
    studio, food, dating, total: studio + food,
    internet: v('cf-internet') || 'Fast',
    safety:   v('cf-safety')   || 'Safe',
    climate:  (v('cf-climate')||'').trim() || '—',
    custom: true,
  });
  localStorage.setItem('hyk_custom_cities', JSON.stringify(S.customCities));
  S.showCityForm = false;
  render();
}

function removeCustomCity(i) {
  S.customCities.splice(i, 1);
  localStorage.setItem('hyk_custom_cities', JSON.stringify(S.customCities));
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function timeAgo(d) {
  const diff = Math.floor((Date.now()-new Date(d))/60000);
  if(diff<1) return 'just now';
  if(diff<60) return `${diff}m ago`;
  if(diff<1440) return `${Math.floor(diff/60)}h ago`;
  return `${Math.floor(diff/1440)}d ago`;
}
function fmtPx(n) {
  if(n>=10000) return '$'+Math.round(n/1000)+'k';
  if(n>=1000) return '$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  if(n>=1) return '$'+n.toFixed(2);
  return '$'+n.toFixed(4);
}
function wxIcon(code){ return (WX[code]||['🌡️','Unknown']); }
function wxColor(t){ return t<0?'#88CCFF':t<10?'#AADDFF':t>28?'var(--or)':'var(--gn)'; }
function getHourIdx(){ return new Date().getHours(); }

function buildGauge(val) {
  const r=46, hc=Math.PI*r;
  const fill=(val/100)*hc, offset=hc-fill;
  const fgm=fgMeta(val);
  const ar=(Math.PI*(1-val/100));
  const cx=65,cy=66,nl=42;
  const nx=cx+Math.cos(ar)*nl, ny=cy-Math.sin(ar)*nl;
  return `<svg width="130" height="78" viewBox="0 0 130 78">
    <path d="M 10 68 A 55 55 0 0 1 120 68" fill="none" stroke="var(--s2)" stroke-width="9" stroke-linecap="round"/>
    <path d="M 10 68 A 55 55 0 0 1 120 68" fill="none" stroke="${fgm.color}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${(Math.PI*(r+(9/2))).toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="rgba(216,232,255,.85)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="rgba(216,232,255,.85)"/>
  </svg>`;
}

function xioMd(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--tx)">$1</strong>')
    .replace(/\*([^*]+?)\*/g,'<em style="color:rgba(255,107,157,.8)">$1</em>')
    .replace(/^#{1,2} (.+)$/gm,'<div style="font-weight:900;color:#FF6B9D;font-size:11px;margin:8px 0 3px;letter-spacing:.04em">$1</div>')
    .replace(/^#{3} (.+)$/gm,'<div style="font-weight:800;color:var(--cy);font-size:10px;margin:6px 0 2px">$1</div>')
    .replace(/^▸ (.+)$/gm,'<div style="color:var(--cy);font-weight:800;margin:5px 0 1px;font-size:11px">▸ $1</div>')
    .replace(/^[•\-\*] (.+)$/gm,'<div style="padding-left:14px;margin:2px 0;position:relative"><span style="position:absolute;left:4px;color:rgba(255,107,157,.6)">·</span>$1</div>')
    .replace(/\n\n/g,'<div style="height:6px"></div>')
    .replace(/\n/g,'<br>');
}

async function sendToXiomara(userMsg) {
  if(!userMsg.trim()||S.xiomara.streaming) return;
  const key = S.xiomara.apiKey;
  if(!key) return;
  S.xiomara.msgs.push({role:'user',content:userMsg.trim()});
  S.xiomara.msgs.push({role:'assistant',content:''});
  S.xiomara.streaming = true;
  renderXioChat();
  const msgs = [
    {role:'system', content:buildXioSystem()},
    ...S.xiomara.msgs.slice(0,-1).map(m=>({role:m.role,content:m.content})),
  ];
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+key,
      },
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:2048,
        stream:true,
        messages:msgs,
      }),
    });
    if(!res.ok) {
      const err = await res.json().catch(()=>({error:{message:'HTTP '+res.status}}));
      S.xiomara.msgs[S.xiomara.msgs.length-1].content = `⚠️ ${err.error?.message||'API error — check your key'}`;
    } else {
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while(true) {
        const {done,value} = await reader.read();
        if(done) break;
        buf += dec.decode(value,{stream:true});
        const lines = buf.split('\n');
        buf = lines.pop();
        for(const line of lines) {
          if(!line.startsWith('data: ')) continue;
          const d = line.slice(6).trim();
          if(d==='[DONE]') continue;
          try {
            const ev = JSON.parse(d);
            const txt = ev.choices?.[0]?.delta?.content;
            if(txt) {
              S.xiomara.msgs[S.xiomara.msgs.length-1].content += txt;
              renderXioChat();
            }
          } catch {}
        }
      }
    }
  } catch(e) {
    S.xiomara.msgs[S.xiomara.msgs.length-1].content = `⚠️ Connection error: ${e.message}`;
  }
  S.xiomara.streaming = false;
  renderXioChat();
  localStorage.setItem('hyk_xio_msgs',JSON.stringify(S.xiomara.msgs.slice(-30)));
}

function getXioVoice() {
  const voices = window.speechSynthesis.getVoices();
  // Prefer Google UK English Female, then any English female, then any English
  return voices.find(v => v.name === 'Google UK English Female')
      || voices.find(v => /female/i.test(v.name) && /en[-_]/i.test(v.lang))
      || voices.find(v => /female/i.test(v.name))
      || voices.find(v => /en[-_]/i.test(v.lang))
      || voices[0] || null;
}

function xioSpeak(text) {
  window.speechSynthesis.cancel();
  const clean = text.replace(/#{1,6}\s/g,'').replace(/\*{1,3}([^*]+)\*{1,3}/g,'$1')
    .replace(/`[^`]*`/g,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/\n{2,}/g,'. ').trim();
  const utt = new SpeechSynthesisUtterance(clean);
  const voice = getXioVoice();
  if(voice) utt.voice = voice;
  utt.pitch = 1.1;
  utt.rate  = 0.88;
  utt.lang  = 'en-US';
  utt.onstart = () => updateXioSpeakBtn(true);
  utt.onend   = () => updateXioSpeakBtn(false);
  utt.onerror = () => updateXioSpeakBtn(false);
  window.speechSynthesis.speak(utt);
}

function xioSpeakLast() {
  if(window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); updateXioSpeakBtn(false); return; }
  const last = [...S.xiomara.msgs].reverse().find(m => m.role === 'assistant' && m.content.trim());
  if(!last) return;
  xioSpeak(last.content);
}

    {label:'🏎️ Supercar Weekend', msg:'I want to rent a Lamborghini or Ferrari for a weekend. Which city in my database gives me the best experience for my budget? Include approximate cost.'},
    {label:'💎 Luxury Per Dollar',msg:'Rank the top 5 cities from my database where my money gets me the most luxury — private pools, fine dining, VIP nightlife. Compare Bangkok vs Dubai vs Medellín.'},
    {label:'📏 Height Advantage', msg:'I\'m 6\'2" (188cm). Rank the cities in my database by how tall I would be perceived — giant to average. Include each country\'s average male height and the perception delta.'},
    {label:'🌺 Afro-Latina Guide',msg:'Which cities in my database give me the best opportunity to meet Afro-Latina women? Rank by demographic density and dating scene quality.'},
    {label:'🧵 Bespoke Suits',    msg:'Where can I get a custom bespoke suit worth the trip? Rank by quality and price, and tell me which cities in my database are closest to the best tailoring destinations.'},
    {label:'🥃 Cigar & Nightlife',msg:'Rank my cities for cigar lounge culture, rooftop bars, and high-end nightlife. Where do I go for a luxury night out?'},
    {label:'🏍️ Motorcycle Rentals',msg:'Where can I rent a motorcycle or superbike for cheap? What\'s the licensing situation for a Canadian? Rank by value and experience.'},
    {label:'🎌 JDM Experience',   msg:'I want to drive a Nissan GTR Skyline or other JDM legends. Where in the world can I do this and what\'s the cost?'},
  ];
  return `
  <div style="display:grid;grid-template-columns:1fr 310px;gap:12px;height:calc(100vh - 82px)">

    <!-- ── CHAT COLUMN ── -->
    <div style="display:flex;flex-direction:column;background:var(--s1);border:1px solid rgba(255,107,157,.15);border-radius:var(--r);overflow:hidden">

      <!-- Header -->
      <div style="padding:11px 15px;border-bottom:1px solid rgba(255,107,157,.1);display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(255,107,157,.02)">
        <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#8B0020,#FF6B9D);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 14px rgba(255,107,157,.35);animation:xio-pulse 3s infinite">🌹</div>
        <div>
          <div style="font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:#FF6B9D;letter-spacing:.12em;text-shadow:0 0 12px rgba(255,107,157,.4)">XIOMARA</div>
          <div style="font-size:9px;color:var(--mu)">Personal Intelligence Advisor · HYK Terminal v2</div>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <div style="display:flex;align-items:center;gap:5px">
            <div style="width:7px;height:7px;border-radius:50%;background:${hasKey?'var(--gn)':'var(--rd)'};box-shadow:0 0 5px ${hasKey?'var(--gn)':'var(--rd)'}"></div>
            <span style="font-size:9px;color:var(--mu)">${hasKey?'Active':'No Key'}</span>
          </div>
          <button id="xio-speak-btn" onclick="xioSpeakLast()" title="Hear Xiomara speak"
            style="padding:3px 8px;background:rgba(255,107,157,.06);border:1px solid rgba(255,107,157,.18);border-radius:4px;color:rgba(255,107,157,.55);font-size:13px;cursor:pointer;line-height:1;transition:color .2s">🔊</button>
          ${S.xiomara.msgs.length>0?`<button onclick="xioClearChat()" style="padding:3px 8px;background:rgba(255,51,85,.07);border:1px solid rgba(255,51,85,.18);border-radius:4px;color:var(--rd);font-size:8px;font-weight:700;cursor:pointer">Clear</button>`:''}
        </div>
      </div>

      ${!hasKey?`
      <!-- API Key Setup -->
      <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:30px">
        <div style="max-width:420px;width:100%;text-align:center">
          <div style="font-size:44px;margin-bottom:14px;animation:xio-pulse 2.5s infinite">🌹</div>
          <div style="font-family:'Orbitron',monospace;font-size:13px;color:#FF6B9D;margin-bottom:8px;letter-spacing:.1em">ACTIVATE XIOMARA</div>
          <div style="font-size:10px;color:var(--mu);margin-bottom:20px;line-height:1.7;max-width:340px;margin-left:auto;margin-right:auto">
            Xiomara runs on Llama 3.1 70B via Groq — completely free. Sign up at console.groq.com, grab your API key, paste it below. Stored locally, never leaves your machine except to Groq's servers.
          </div>
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <input id="xio-key-inp" type="password" placeholder="gsk_..."
              style="flex:1;padding:10px 13px;background:var(--s2);border:1px solid rgba(255,107,157,.3);border-radius:var(--rs);color:var(--tx);font-size:11px;outline:none;font-family:'Inter',sans-serif"
              onkeydown="if(event.key==='Enter')xioSaveKey()"/>
            <button onclick="xioSaveKey()" style="padding:10px 16px;background:linear-gradient(135deg,#8B0020,#FF6B9D);border:none;border-radius:var(--rs);color:#fff;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.06em;white-space:nowrap">CONNECT</button>
          </div>
          <div style="font-size:9px;color:rgba(255,107,157,.4)">Free key at <span style="color:#FF6B9D">console.groq.com</span> → API Keys — no credit card needed</div>
        </div>
      </div>
      `:`
      <!-- Chat Messages -->
      <div id="xio-chat" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:4px">
      </div>

      <!-- Input Bar -->
      <div style="padding:10px 12px;border-top:1px solid rgba(255,107,157,.08);flex-shrink:0;background:rgba(255,107,157,.01)">
        <div style="display:flex;gap:8px;align-items:center">
          <input id="xio-input" type="text" placeholder="Ask Xiomara anything — travel, intel, lifestyle, city comparisons..."
            style="flex:1;padding:9px 13px;background:var(--s2);border:1px solid rgba(255,107,157,.18);border-radius:var(--rs);color:var(--tx);font-size:11px;outline:none;font-family:'Inter',sans-serif;transition:border .15s"
            onfocus="this.style.borderColor='rgba(255,107,157,.45)'"
            onblur="this.style.borderColor='rgba(255,107,157,.18)'"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();xioSend()}"/>
          <button onclick="xioSend()" title="Send"
            style="width:36px;height:36px;background:linear-gradient(135deg,#8B0020,#FF6B9D);border:none;border-radius:var(--rs);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;box-shadow:0 2px 8px rgba(255,107,157,.3)"
            onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">→</button>
        </div>
      </div>
      `}
    </div>

    <!-- ── RIGHT PANEL ── -->
    <div style="display:flex;flex-direction:column;gap:10px;overflow-y:auto">

      <!-- Quick Actions -->
      <div style="background:var(--s1);border:1px solid rgba(255,107,157,.12);border-radius:var(--r);padding:12px">
        <div class="ct" style="color:rgba(255,107,157,.55)"><div class="ctd" style="background:#FF6B9D"></div>QUICK INTEL</div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${quickBtns.map(b=>`<button onclick='xioQuick(${JSON.stringify(b.msg)})'
            style="padding:7px 10px;background:rgba(255,107,157,.04);border:1px solid rgba(255,107,157,.1);border-radius:var(--rs);color:var(--mu);font-size:10px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:7px"
            onmouseover="this.style.background='rgba(255,107,157,.1)';this.style.color='#FF6B9D';this.style.borderColor='rgba(255,107,157,.3)'"
            onmouseout="this.style.background='rgba(255,107,157,.04)';this.style.color='var(--mu)';this.style.borderColor='rgba(255,107,157,.1)'">${b.label}</button>`).join('')}
        </div>
      </div>

      <!-- Active Context -->
      <div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px">
        <div class="ct"><div class="ctd"></div>ACTIVE CONTEXT</div>
        ${[
          ['Travel Budget', S.travelBudget?`C$${S.travelBudget.toLocaleString()}/mo`:'Not set', S.travelBudget?'var(--gn)':'var(--rd)'],
          ['Cities Tracked', `${CITIES.length+S.customCities.length}`, 'var(--cy)'],
          ['FX Rates', S.fx.rates?`Live · ${S.fx.date}`:'Loading...', S.fx.rates?'var(--gn)':'var(--or)'],
          ['Display Currency', S.fx.displayCur, 'var(--gold)'],
          ['Chat History', `${S.xiomara.msgs.length} messages`, 'var(--mu)'],
        ].map(([k,v,c])=>`<div style="display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid var(--dm)">
          <span style="color:var(--mu)">${k}</span><span style="font-weight:700;color:${c}">${v}</span>
        </div>`).join('')}
      </div>

      <!-- MU Quick Reference -->
      <div style="background:var(--s1);border:1px solid rgba(255,107,157,.1);border-radius:var(--r);padding:12px">
        <div class="ct" style="color:rgba(255,107,157,.55)"><div class="ctd" style="background:#FF6B9D"></div>🌹 BEAUTY BONUS</div>
        ${[
          {t:'S',c:'var(--gn)',  bonus:'+15%', countries:'Venezuela · USA · Philippines · Mexico · Brazil · Puerto Rico'},
          {t:'A',c:'var(--cy)',  bonus:'+10%', countries:'Colombia · India · Thailand · Australia · Nigeria · S.Korea · Japan'},
          {t:'B',c:'var(--gold)',bonus:'+7%',  countries:'Dom.Rep · Jamaica · Sweden · Spain · Indonesia · Ukraine · S.Africa'},
          {t:'C',c:'var(--or)', bonus:'+3%',  countries:'Denmark · Norway · Finland · France · Israel · Ethiopia · Morocco'},
        ].map(r=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--dm);align-items:flex-start">
          <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:1px">
            <div style="width:18px;height:16px;background:${r.c};border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:9px;font-weight:900;color:#030311">${r.t}</div>
            <div style="font-size:8px;color:${r.c};font-weight:700">${r.bonus}</div>
          </div>
          <div style="font-size:9px;color:var(--mu);line-height:1.5">${r.countries}</div>
        </div>`).join('')}
      </div>

      <!-- API Key Management -->
      ${hasKey?`<div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px">
        <div class="ct"><div class="ctd"></div>API KEY</div>
        <div style="font-size:9px;color:var(--mu);margin-bottom:8px">Active: gsk_...${S.xiomara.apiKey.slice(-6)}</div>
        <button onclick="S.xiomara.apiKey='';localStorage.removeItem('hyk_xio_key');render()"
          style="padding:5px 10px;background:rgba(255,51,85,.07);border:1px solid rgba(255,51,85,.18);border-radius:4px;color:var(--rd);font-size:9px;font-weight:700;cursor:pointer;width:100%">Revoke Key</button>
      </div>`:''}

    </div>
  </div>`;
}

// ── CCTV ──────────────────────────────────────────────────────────────────────
function loadCam() {
  const id = document.getElementById('cam-id')?.value;
  const frame = document.getElementById('cam-frame');
  if (frame && id) {
    frame.src = `https://www.quebec511.info/fr/Diffusion/EtatReseau/Camera.aspx?Type=1&Id=${id}`;
  }
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
let clockInterval;
function startClock() {
  clearInterval(clockInterval);
  const tick = () => {
    const now = new Date();
    const clk = document.getElementById('hdr-clk');
    const dt = document.getElementById('hdr-dt');
    if(clk) clk.textContent = now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if(dt) dt.textContent = now.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
  };
  tick();
  clockInterval = setInterval(tick, 1000);
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const entcat = e.target.closest('[data-entcat]');
  if(entcat){ S.entCat=entcat.dataset.entcat; S.entItems=[]; localStorage.setItem('hyk_ent_cat',S.entCat); render(); return; }
  const srcf = e.target.closest('[data-srcf]');
  if(srcf){ S.srcFilter=srcf.dataset.srcf; render(); return; }
  const btn = e.target.closest('[data-v]');
  if(btn){ if(btn.dataset.v!=='xiomara') window.speechSynthesis?.cancel(); S.view=btn.dataset.v; localStorage.setItem('hyk_intel_v',S.view); render(); return; }
  if(e.target.id==='rbtn') fetchAll();
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
// Pre-load speech voices (Chromium loads them async on first call)
if(window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
}

render();
fetchAll();
fetchFX();
setInterval(fetchAll, 5*60*1000); // auto-refresh every 5 min
setInterval(fetchFX,  5*60*1000); // FX rates every 5 min
</script>
</body>
</html>
