<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HYK</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HYK">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0a0a1a;overflow:hidden;font-family:'Inter',system-ui,sans-serif}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#frames{flex:1;position:relative;overflow:hidden}
iframe{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;display:none;background:#0a0a1a
}
iframe.active{display:block}

/* ── Splash screen ── */
#splash{
  position:fixed;inset:0;z-index:999;
  background:#0a0a1a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;transition:opacity .4s ease
}
#splash.hidden{opacity:0;pointer-events:none}
#splash svg{width:96px;height:96px;filter:drop-shadow(0 0 18px rgba(201,168,76,.4))}
#splash h1{
  font-size:32px;font-weight:800;letter-spacing:.14em;
  background:linear-gradient(135deg,#F0D570,#C9A84C,#A87832);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
#splash p{font-size:12px;color:rgba(201,168,76,.4);letter-spacing:.25em;text-transform:uppercase}

/* ── Bottom nav ── */
nav{
  display:flex;
  background:#0d0d22;
  border-top:1px solid rgba(201,168,76,.18);
  padding-bottom:env(safe-area-inset-bottom,0px)
}
nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px 8px;background:none;border:none;cursor:pointer;gap:4px;
  transition:background .15s;-webkit-tap-highlight-color:transparent;
  position:relative
}
nav button:active{background:rgba(201,168,76,.06)}
.nav-icon{font-size:22px;line-height:1;transition:filter .2s}
.nav-label{
  font-size:10px;letter-spacing:.06em;color:rgba(255,255,255,.3);
  text-transform:uppercase;font-weight:700;transition:color .2s
}
nav button.active .nav-label{color:#C9A84C}
nav button.active .nav-icon{filter:drop-shadow(0 0 6px rgba(201,168,76,.7))}
nav button.active::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:32px;height:2px;background:#C9A84C;border-radius:0 0 2px 2px
}

/* ── Loading indicator shown in frame area while tab loads ── */
.frame-loader{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;color:rgba(201,168,76,.4);
  font-size:13px;letter-spacing:.08em;text-transform:uppercase;
  pointer-events:none
}
.spinner{
  width:32px;height:32px;border:2px solid rgba(201,168,76,.12);
  border-top-color:#C9A84C;border-radius:50%;animation:spin .8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0f0f28"/>
        <stop offset="100%" stop-color="#050510"/>
      </linearGradient>
      <linearGradient id="sgld" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F0D570"/>
        <stop offset="50%" stop-color="#C9A84C"/>
        <stop offset="100%" stop-color="#A87832"/>
      </linearGradient>
    </defs>
    <rect width="512" height="512" rx="96" fill="url(#sbg)"/>
    <rect x="14" y="14" width="484" height="484" rx="82" fill="none" stroke="url(#sgld)" stroke-width="4" opacity=".55"/>
    <polygon points="256,72 278,110 256,148 234,110" fill="url(#sgld)" opacity=".75"/>
    <text x="256" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="172" font-weight="700" fill="url(#sgld)" letter-spacing="-2">HYK</text>
    <text x="256" y="388" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" fill="#C9A84C" opacity=".5" letter-spacing="10">SUITE</text>
  </svg>
  <h1>HYK</h1>
  <p>Personal Command Center</p>
</div>

<div id="app">
  <div id="frames">
    <div class="frame-loader" id="loader-budget">
      <div class="spinner"></div>Loading Budget…
    </div>
    <div class="frame-loader" id="loader-intel" style="display:none">
      <div class="spinner"></div>Loading Intel…
    </div>
    <div class="frame-loader" id="loader-calendar" style="display:none">
      <div class="spinner"></div>Loading Calendar…
    </div>

    <iframe id="frame-budget"   src="budget.html"   title="HYK Budget"></iframe>
    <iframe id="frame-intel"    title="HYK Intel"></iframe>
    <iframe id="frame-calendar" title="HYK Calendar"></iframe>
  </div>

  <nav>
    <button class="active" data-tab="budget" onclick="switchTab(this)">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Budget</span>
    </button>
    <button data-tab="intel" onclick="switchTab(this)">
      <span class="nav-icon">🖥️</span>
      <span class="nav-label">Intel</span>
    </button>
    <button data-tab="calendar" onclick="switchTab(this)">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Calendar</span>
    </button>
  </nav>
</div>

<script>
const SRCS = { budget: 'budget.html', intel: 'intel.html', calendar: 'calendar.html' };
const loaded = { budget: false, intel: false, calendar: false };
let active = 'budget';

function switchTab(btn) {
  const tab = btn.dataset.tab;
  if (tab === active) return;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('frame-' + active).classList.remove('active');
  active = tab;

  const frame = document.getElementById('frame-' + tab);
  frame.classList.add('active');

  if (!loaded[tab]) {
    loaded[tab] = true;
    document.getElementById('loader-' + tab).style.display = 'flex';
    frame.src = SRCS[tab];
    frame.onload = () => { document.getElementById('loader-' + tab).style.display = 'none'; };
  }
}

// Budget loads immediately — hide its loader once ready
document.getElementById('frame-budget').classList.add('active');
document.getElementById('frame-budget').onload = () => {
  loaded.budget = true;
  document.getElementById('loader-budget').style.display = 'none';
  // Hide splash after first frame loads
  document.getElementById('splash').classList.add('hidden');
  setTimeout(() => document.getElementById('splash').remove(), 500);
};

// Fallback: hide splash after 3s regardless
setTimeout(() => {
  const s = document.getElementById('splash');
  if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 500); }
}, 3000);

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
