<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f28"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="gld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D570"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A87832"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gold border frame -->
  <rect x="14" y="14" width="484" height="484" rx="82" fill="none" stroke="url(#gld)" stroke-width="4" opacity=".55"/>
  <!-- Diamond top accent -->
  <polygon points="256,72 278,110 256,148 234,110" fill="url(#gld)" opacity=".75"/>
  <!-- HYK monogram -->
  <text x="256" y="330" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="172" font-weight="700"
    fill="url(#gld)" letter-spacing="-2">HYK</text>
  <!-- SUITE tagline -->
  <text x="256" y="388" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="34" font-weight="400"
    fill="#C9A84C" opacity=".5" letter-spacing="10">SUITE</text>
</svg>
