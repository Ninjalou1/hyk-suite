<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HYK — Calendar</title>
<style>
:root {
  --bg:      #06060F;
  --s1:      #0C0C1E;
  --s2:      #12122A;
  --s3:      #1A1A38;
  --s4:      #222248;
  --gold:    #C9A84C;
  --gold2:   #E8CC78;
  --gold-d:  rgba(201,168,76,0.16);
  --gold-g:  rgba(201,168,76,0.07);
  --text:    #EDE8E0;
  --muted:   #6B6A88;
  --dim:     #252540;
  --border:  rgba(201,168,76,0.18);
  --radius:  10px;
  --r-sm:    6px;
  /* event type colors */
  --tc: #5B9EFF; --tb: rgba(91,158,255,0.14);
  --ec: #C9A84C; --eb: rgba(201,168,76,0.14);
  --bc: #FF6B9D; --bb: rgba(255,107,157,0.14);
  --hc: #00C9A7; --hb: rgba(0,201,167,0.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,Ubuntu,sans-serif;font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7) sepia(1) saturate(2) hue-rotate(10deg)}
#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.hdr-logo{font-size:19px;font-weight:900;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;flex-shrink:0}
.hdr-logo span{font-size:9px;font-weight:400;color:var(--muted);display:block;letter-spacing:.15em;margin-top:-2px}
.hdr-nav{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-period{font-size:15px;font-weight:800;color:var(--text);min-width:190px;text-align:center}
.icon-btn{width:30px;height:30px;background:var(--s2);border:1px solid var(--dim);border-radius:7px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0}
.icon-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-d)}
.today-btn{padding:5px 12px;background:var(--s2);border:1px solid var(--dim);border-radius:7px;color:var(--muted);font-size:10px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;white-space:nowrap}
.today-btn:hover{border-color:var(--gold);color:var(--gold)}
.view-tabs{display:flex;background:var(--bg);border:1px solid var(--dim);border-radius:8px;padding:3px;gap:2px}
.vtab{padding:4px 13px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;color:var(--muted);border:none;background:none;transition:all .15s;white-space:nowrap}
.vtab.active{background:var(--gold);color:var(--bg)}
.vtab:not(.active):hover{color:var(--gold)}
.add-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--gold);border:none;border-radius:8px;color:var(--bg);font-size:11px;font-weight:900;letter-spacing:.06em;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.add-btn:hover{background:var(--gold2);transform:translateY(-1px)}
.clock{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.08em;min-width:68px;text-align:right;flex-shrink:0}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;padding:7px 20px;background:var(--s1);border-bottom:1px solid var(--dim);flex-shrink:0}
.fl{font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-right:2px}
.fchip{display:flex;align-items:center;gap:5px;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:800;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.03em;user-select:none}
.fchip.task{border-color:var(--tc);color:var(--tc)}.fchip.event{border-color:var(--ec);color:var(--ec)}
.fchip.birthday{border-color:var(--bc);color:var(--bc)}.fchip.holiday{border-color:var(--hc);color:var(--hc)}
.fchip.on.task{background:var(--tb)}.fchip.on.event{background:var(--eb)}
.fchip.on.birthday{background:var(--bb)}.fchip.on.holiday{background:var(--hb)}
.fchip:not(.on){opacity:.38}
.fdot{width:7px;height:7px;border-radius:50%}
.fchip.task .fdot{background:var(--tc)}.fchip.event .fdot{background:var(--ec)}
.fchip.birthday .fdot{background:var(--bc)}.fchip.holiday .fdot{background:var(--hc)}

/* CONTENT */
.content{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:262px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.mini-cal{padding:14px;border-bottom:1px solid var(--dim)}
.mini-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mini-title{font-size:12px;font-weight:800;color:var(--text)}
.mini-nav{width:22px;height:22px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:color .15s}
.mini-nav:hover{color:var(--gold)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mdow{font-size:8px;font-weight:800;text-align:center;color:var(--muted);padding-bottom:4px;text-transform:uppercase}
.mday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:50%;cursor:pointer;color:var(--text);transition:all .12s;position:relative}
.mday:hover:not(.empty){background:var(--gold-d);color:var(--gold)}
.mday.today{background:var(--gold);color:var(--bg);font-weight:900}
.mday.sel:not(.today){border:1.5px solid var(--gold);color:var(--gold)}
.mday.om{color:var(--dim);cursor:default}
.mday.he::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--gold);border-radius:50%}
.mday.today.he::after{background:var(--bg)}

/* UPCOMING */
.upcoming{flex:1;overflow-y:auto;padding:14px}
.up-ttl{font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.up-grp{margin-bottom:12px}
.up-date{font-size:9px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;padding-bottom:5px;border-bottom:1px solid var(--dim);margin-bottom:6px}
.up-item{display:flex;align-items:flex-start;gap:7px;padding:5px 7px;border-radius:var(--r-sm);margin-bottom:2px;cursor:pointer;transition:background .12s}
.up-item:hover{background:var(--s2)}
.up-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.up-dot.task{background:var(--tc)}.up-dot.event{background:var(--ec)}.up-dot.birthday{background:var(--bc)}.up-dot.holiday{background:var(--hc)}
.up-name{font-size:11px;color:var(--text);font-weight:500;line-height:1.3}
.up-time{font-size:9px;color:var(--muted);margin-top:1px}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;position:relative}
.view-area{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* MONTH VIEW */
.mv{flex:1;display:flex;flex-direction:column;padding:10px;gap:3px;overflow:hidden}
.mv-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.mv-dow{text-align:center;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:3px 0}
.mv-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:3px}
.mc{background:var(--s1);border:1px solid var(--dim);border-radius:var(--r-sm);padding:5px;overflow:hidden;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:column;min-height:0}
.mc:hover{border-color:rgba(201,168,76,.4)}
.mc.today{border-color:var(--gold);background:var(--gold-g)}
.mc.sel{border-color:var(--gold);background:var(--gold-d)}
.mc.om{opacity:.35}
.dn{font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px;display:flex;align-items:center}
.dn.tn{width:20px;height:20px;background:var(--gold);color:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900}
.mc-evts{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:2px}
.ep{font-size:9.5px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep.task{background:var(--tb);color:var(--tc)}.ep.event{background:var(--eb);color:var(--ec)}
.ep.birthday{background:var(--bb);color:var(--bc)}.ep.holiday{background:var(--hb);color:var(--hc)}
.ep.done{opacity:.4;text-decoration:line-through}
.more{font-size:9px;color:var(--muted);padding:1px 4px}

/* WEEK VIEW */
.wv{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px;gap:0}
.wv-head{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:1px solid var(--dim)}
.wv-hcell{text-align:center;padding:8px 4px}
.wv-dow{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.wv-dow.today{color:var(--gold)}
.wv-dnum{font-size:22px;font-weight:900;color:var(--text);line-height:1.1}
.wv-dnum.today{width:36px;height:36px;background:var(--gold);color:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto}
.wv-allday{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:1px solid var(--dim);min-height:24px}
.wv-ad-lbl{font-size:8px;color:var(--muted);padding:4px 4px 4px 0;text-align:right;align-self:center}
.wv-ad-cell{border-left:1px solid var(--dim);padding:2px;display:flex;flex-wrap:wrap;gap:2px}
.wv-body{flex:1;overflow-y:auto;position:relative}
.wv-inner{display:grid;grid-template-columns:48px repeat(7,1fr)}
.wv-tlbl{height:50px;border-right:1px solid var(--dim);padding:0 5px 0 0;display:flex;align-items:flex-start}
.tl{font-size:8.5px;color:var(--muted);transform:translateY(-6px);white-space:nowrap;text-align:right;width:100%}
.wv-col{border-left:1px solid var(--dim);position:relative}
.wv-hcell-time{height:50px;border-bottom:1px solid rgba(37,37,64,.9)}
.wv-half{border-bottom:1px dashed var(--dim);height:25px}
.wv-evt{position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 5px;font-size:9px;font-weight:700;cursor:pointer;overflow:hidden;line-height:1.3;transition:opacity .15s;z-index:2}
.wv-evt:hover{opacity:.82}
.wv-evt.task{background:var(--tb);color:var(--tc);border-left:3px solid var(--tc)}
.wv-evt.event{background:var(--eb);color:var(--ec);border-left:3px solid var(--ec)}
.wv-evt.birthday{background:var(--bb);color:var(--bc);border-left:3px solid var(--bc)}
.wv-evt.holiday{background:var(--hb);color:var(--hc);border-left:3px solid var(--hc)}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--gold);z-index:10;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--gold)}

/* DAY VIEW */
.dv{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px}
.dv-head{text-align:center;padding:14px;border-bottom:1px solid var(--dim)}
.dv-dn{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.dv-num{font-size:52px;font-weight:900;line-height:1;color:var(--text)}
.dv-num.t{color:var(--gold)}
.dv-body{flex:1;overflow-y:auto;display:grid;grid-template-columns:48px 1fr}
.dv-col{position:relative;border-left:1px solid var(--dim)}
.dv-allday{grid-column:1/-1;border-bottom:1px solid var(--dim);display:flex;min-height:24px}
.dv-ad-l{font-size:8px;color:var(--muted);padding:4px;text-align:right;width:48px;flex-shrink:0}
.dv-ad-items{flex:1;padding:2px;display:flex;flex-wrap:wrap;gap:3px}

/* YEAR VIEW */
.yv{flex:1;overflow-y:auto;padding:12px 10px}
.yv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ym{background:var(--s1);border:1px solid var(--dim);border-radius:var(--radius);padding:10px;cursor:pointer;transition:border-color .15s}
.ym:hover{border-color:rgba(201,168,76,.4)}
.ym-title{font-size:11px;font-weight:900;color:var(--text);margin-bottom:7px;text-align:center;letter-spacing:.02em}
.ym-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.ydow{font-size:6.5px;text-align:center;color:var(--muted);font-weight:800;padding-bottom:2px}
.yd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:8px;border-radius:50%;cursor:pointer;transition:all .1s;position:relative;color:var(--text)}
.yd:hover:not(.ye){background:var(--gold-d);color:var(--gold)}
.yd.yt{background:var(--gold);color:var(--bg);font-weight:900}
.yd.yhe::after{content:'';position:absolute;bottom:0px;left:50%;transform:translateX(-50%);width:3px;height:3px;background:var(--gold);border-radius:50%}
.yd.yt.yhe::after{background:var(--bg)}
.yd.yo{color:var(--dim)}

/* DAY PANEL */
.dp{width:254px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.dp-head{padding:14px;border-bottom:1px solid var(--dim)}
.dp-date{font-size:12px;font-weight:900;color:var(--gold);text-transform:uppercase;letter-spacing:.06em}
.dp-dow{font-size:10px;color:var(--muted);margin-top:2px}
.dp-evts{flex:1;overflow-y:auto;padding:10px}
.dp-empty{font-size:11px;color:var(--muted);text-align:center;padding:20px 0;font-style:italic}
.di{background:var(--s2);border-radius:var(--r-sm);padding:9px 10px;margin-bottom:5px;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.di:hover{background:var(--s3)}
.di.task{border-left-color:var(--tc)}.di.event{border-left-color:var(--ec)}
.di.birthday{border-left-color:var(--bc)}.di.holiday{border-left-color:var(--hc)}
.di-title{font-size:12px;font-weight:700;color:var(--text)}
.di-title.done{text-decoration:line-through;opacity:.45}
.di-meta{font-size:9px;color:var(--muted);margin-top:2px}
.di-acts{display:flex;gap:5px;margin-top:6px}
.da{font-size:9px;font-weight:800;padding:3px 9px;border-radius:3px;cursor:pointer;border:none;transition:opacity .15s;letter-spacing:.03em}
.da:hover{opacity:.8}
.da.done-btn{background:var(--tb);color:var(--tc)}
.da.edit-btn{background:var(--s3);color:var(--muted)}
.da.del-btn{background:rgba(255,70,70,.1);color:#FF5050}
.dp-add{padding:10px;border-top:1px solid var(--dim)}
.dp-add-btn{width:100%;padding:8px;background:none;border:1px dashed var(--dim);border-radius:var(--r-sm);color:var(--muted);font-size:10px;font-weight:800;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.06em}
.dp-add-btn:hover{border-color:var(--gold);color:var(--gold)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:16px;width:500px;max-height:88vh;overflow-y:auto;padding:26px;box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 1px rgba(201,168,76,.08)}
.m-ttl{font-size:17px;font-weight:900;color:var(--gold);margin-bottom:20px;letter-spacing:-.01em}
.fr{margin-bottom:14px}
.fl2{display:block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
.fi,.fs,.fta{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--dim);border-radius:var(--r-sm);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--gold)}
.fs{cursor:pointer}
option{background:var(--s2)}
.fta{resize:vertical;min-height:70px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-row{display:flex;gap:7px;flex-wrap:wrap}
.topt{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:800;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.03em;user-select:none}
.topt.task{border-color:var(--tc);color:var(--tc)}.topt.event{border-color:var(--ec);color:var(--ec)}
.topt.birthday{border-color:var(--bc);color:var(--bc)}.topt.holiday{border-color:var(--hc);color:var(--hc)}
.topt.act.task{background:var(--tb)}.topt.act.event{background:var(--eb)}
.topt.act.birthday{background:var(--bb)}.topt.act.holiday{background:var(--hb)}
.m-foot{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;align-items:center}
.m-del{padding:8px 16px;background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.3);border-radius:var(--r-sm);color:#FF5050;font-size:11px;font-weight:800;cursor:pointer;margin-right:auto;transition:all .15s}
.m-del:hover{background:rgba(255,60,60,.2)}
.m-cancel{padding:8px 16px;background:var(--s2);border:1px solid var(--dim);border-radius:var(--r-sm);color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;transition:all .15s}
.m-cancel:hover{border-color:var(--muted);color:var(--text)}
.m-save{padding:8px 22px;background:var(--gold);border:none;border-radius:var(--r-sm);color:var(--bg);font-size:11px;font-weight:900;cursor:pointer;letter-spacing:.04em;transition:all .15s}
.m-save:hover{background:var(--gold2)}
.cb{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text)}
.cb input{width:15px;height:15px;accent-color:var(--gold);cursor:pointer}

@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fi-anim{animation:fi .18s ease}
.pdf-btn{padding:7px 14px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.4);border-radius:var(--r-sm);color:var(--gold);font-size:11px;font-weight:800;cursor:pointer;letter-spacing:.05em;transition:all .15s}
.pdf-btn:hover{background:rgba(201,168,76,.22);border-color:var(--gold)}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{size:A4 landscape;margin:10mm}
  body{background:#fff!important}
  #app{background:#fff!important}
  .hdr,.filter-bar,.sidebar,.dp-panel,.add-btn,.pdf-btn,.today-btn,.hdr-nav button,.view-tabs{display:none!important}
  .main-layout{grid-template-columns:1fr!important;grid-template-rows:1fr!important}
  .cal-area{width:100%!important;padding:0!important}
  .hdr-logo{display:block!important;font-size:18px!important;font-weight:900!important;color:#000!important;margin-bottom:8px!important;letter-spacing:.1em}
  .hdr-logo span{display:inline!important;font-size:12px!important;color:#555!important;margin-left:6px}
  .hdr-period{display:block!important;font-size:14px!important;color:#333!important;margin-bottom:6px}
  .month-grid,.week-grid,.day-col{border-color:#ccc!important}
  .day-cell{background:#fff!important;border-color:#ddd!important;color:#000!important}
  .day-cell.today{background:#fffff0!important}
  .ev-chip,.ev-block{-webkit-print-color-adjust:exact!important}
  .wk-time,.wk-day-hd{color:#333!important;border-color:#ccc!important;background:#fff!important}
  .wk-allday{background:#f9f9f9!important}
}
@media(max-width:680px){
  /* Header */
  .hdr{flex-wrap:wrap;height:auto;padding:8px 12px;gap:8px}
  .hdr-nav{order:2}
  .hdr-period{min-width:0;font-size:13px;order:2}
  .view-tabs{order:3;width:100%;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .view-tabs::-webkit-scrollbar{display:none}
  .view-tab{font-size:9px;padding:4px 10px}
  .add-btn span{display:none}
  .clock{display:none}
  /* Hide sidebar on mobile — show main calendar full width */
  .sidebar{display:none}
  .content{flex-direction:column}
  /* Calendar grid cells — allow vertical scroll */
  .mc{min-height:44px}
  .ep{font-size:8.5px}
  body{overflow-x:hidden}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Utilities ─────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');
const todayStr = () => {const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`};
const ds = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const pd = s => { const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d); };
const addDays = (d,n) => { const r=new Date(d);r.setDate(r.getDate()+n);return r; };
const startOfWeek = d => { const r=new Date(d);const day=r.getDay();r.setDate(r.getDate()-(day===0?6:day-1));return r; };
const daysInMonth = (y,m) => new Date(y,m,0).getDate();
const isSameDay = (a,b) => ds(new Date(a))===ds(new Date(b));
const monthName = m => ['January','February','March','April','May','June','July','August','September','October','November','December'][m];
const dayName  = d => ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
const shortDay = d => ['SUN','MON','TUE','WED','THU','FRI','SAT'][d];
const uid = () => 'e'+Date.now()+Math.random().toString(36).slice(2,7);

function fmtDate(s, full=false) {
  const d = pd(s), month = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  if(full) return `${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]}, ${month} ${d.getDate()}, ${d.getFullYear()}`;
  return `${month} ${d.getDate()}`;
}
function fmtTime(t) {
  if(!t) return '';
  const [h,m]=t.split(':').map(Number);
  const ampm=h<12?'AM':'PM', hr=h%12||12;
  return `${hr}:${pad(m)} ${ampm}`;
}

// loadEvents merges SEED into localStorage so new entries always appear
// without wiping user-added events
function loadEvents() {
  try {
    const raw = localStorage.getItem('hyk_events');
    const existing = raw ? JSON.parse(raw) : [];
    const existingIds = new Set(existing.map(e => e.id));
    const toAdd = SEED.filter(e => !existingIds.has(e.id));
    const merged = toAdd.length ? [...existing, ...toAdd] : existing;
    if(toAdd.length) localStorage.setItem('hyk_events', JSON.stringify(merged));
    return merged;
  } catch(e) {}
  localStorage.setItem('hyk_events', JSON.stringify(SEED));
  return [...SEED];
}
let EVENTS = loadEvents();
function saveEvents() { localStorage.setItem('hyk_events', JSON.stringify(EVENTS)); }

// ── Event queries ──────────────────────────────────────────────────────────────
function eventsForDate(dateStr) {
  const d = pd(dateStr);
  const mon = d.getMonth(), day = d.getDate(), dow = d.getDay();
  return EVENTS.filter(e => {
    if(!state.filters[e.type]) return false;
    const ed = pd(e.date), em = ed.getMonth(), eday = ed.getDate(), edow = ed.getDay();
    if(e.repeat === 'yearly')  return em === mon && eday === day;
    if(e.repeat === 'monthly') return eday === day;
    if(e.repeat === 'weekly')  return edow === dow;
    return e.date === dateStr;
  });
}
function hasEvents(dateStr) { return eventsForDate(dateStr).length > 0; }
function upcomingEvents(days=14) {
  const today = new Date(), result = [];
  for(let i=0;i<days;i++){
    const d = addDays(today,i), dstr = ds(d);
    const evts = eventsForDate(dstr);
    if(evts.length) result.push({date:dstr, events:evts});
  }
  return result;
}

// ── Render: Header ─────────────────────────────────────────────────────────────
function renderHeader() {
  const { view, cursor } = state;
  let period = '';
  if(view==='month') period = `${monthName(cursor.getMonth())} ${cursor.getFullYear()}`;
  else if(view==='week') {
    const w0 = startOfWeek(cursor), w6 = addDays(w0,6);
    const m0 = monthName(w0.getMonth()).slice(0,3), m6 = monthName(w6.getMonth()).slice(0,3);
    period = w0.getMonth()===w6.getMonth()
      ? `${m0} ${w0.getDate()}–${w6.getDate()}, ${w0.getFullYear()}`
      : `${m0} ${w0.getDate()} – ${m6} ${w6.getDate()}, ${w0.getFullYear()}`;
  }
  else if(view==='day') period = fmtDate(ds(cursor), true);
  else period = `${cursor.getFullYear()}`;

  return `<div class="hdr">
    <div class="hdr-left" style="display:flex;align-items:center;gap:14px">
      <div class="hdr-logo">HYK<span>Master Calendar</span></div>
      <div class="hdr-nav">
        <button class="icon-btn" data-action="prev">‹</button>
        <div class="hdr-period">${period}</div>
        <button class="icon-btn" data-action="next">›</button>
        <button class="today-btn" data-action="today">Today</button>
      </div>
    </div>
    <div class="hdr-right" style="display:flex;align-items:center;gap:10px">
      <div class="view-tabs">
        ${['month','week','day','year'].map(v=>`<button class="vtab${view===v?' active':''}" data-view="${v}">${v}</button>`).join('')}
      </div>
      <button class="pdf-btn" data-action="print">📄 PDF</button>
      <button class="add-btn" data-action="add">＋ Add</button>
      <div class="clock" id="clock"></div>
    </div>
  </div>`;
}

// ── Render: Mini calendar ──────────────────────────────────────────────────────
function renderMiniCal() {
  const mc = state.miniCursor, y = mc.getFullYear(), m = mc.getMonth();
  const first = new Date(y,m,1).getDay(), days = daysInMonth(y,m+1);
  const start = first===0?6:first-1, today = todayStr(), sel = state.selected;
  let cells = '';
  const dows = 'MTWTFSS'.split('').map(d=>`<div class="mdow">${d}</div>`).join('');
  for(let i=0;i<start;i++) cells+=`<div class="mday empty"></div>`;
  for(let d=1;d<=days;d++){
    const dstr=`${y}-${pad(m+1)}-${pad(d)}`;
    const cls=(dstr===today?'today':'')+(dstr===sel&&dstr!==today?' sel':'')+(hasEvents(dstr)?' he':'');
    cells+=`<div class="mday${cls?' '+cls:''}" data-pick="${dstr}">${d}</div>`;
  }
  return `<div class="mini-cal">
    <div class="mini-hdr">
      <button class="mini-nav" data-action="mini-prev">‹</button>
      <div class="mini-title">${monthName(m).slice(0,3)} ${y}</div>
      <button class="mini-nav" data-action="mini-next">›</button>
    </div>
    <div class="mini-grid">${dows}${cells}</div>
  </div>`;
}

// ── Render: Upcoming ──────────────────────────────────────────────────────────
function renderUpcoming() {
  const groups = upcomingEvents(21);
  const today = todayStr();
  const rows = groups.map(g=>{
    const label = g.date===today?'Today':g.date===ds(addDays(new Date(),1))?'Tomorrow':fmtDate(g.date);
    const items = g.events.map(e=>`<div class="up-item" data-edit="${e.id}">
      <div class="up-dot ${e.type}"></div>
      <div><div class="up-name">${e.title}</div>${e.time?`<div class="up-time">${fmtTime(e.time)}</div>`:''}</div>
    </div>`).join('');
    return `<div class="up-grp"><div class="up-date">${label}</div>${items}</div>`;
  }).join('');
  return `<div class="upcoming"><div class="up-ttl">Upcoming</div>${rows||`<div style="font-size:11px;color:var(--muted);font-style:italic">Nothing in the next 3 weeks</div>`}</div>`;
}

// ── Render: Sidebar ───────────────────────────────────────────────────────────
function renderSidebar() {
  return `<div class="sidebar fi-anim">${renderMiniCal()}${renderUpcoming()}</div>`;

  const today = todayStr();

  const dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="mv-dow">${d}</div>`).join('');
  let cells = '';

  // Prev month filler
  const prevDays = daysInMonth(y, m); // days in prev month
  for(let i=start-1;i>=0;i--) {
    const d = prevDays-i, pm = m===0?12:m, py = m===0?y-1:y;
    const dstr=`${py}-${pad(pm)}-${pad(d)}`;
    cells+=`<div class="mc om" data-pick="${dstr}"><div class="dn">${d}</div></div>`;
  }
  // Current month
  for(let d=1;d<=days;d++){
    const dstr=`${y}-${pad(m+1)}-${pad(d)}`;
    const evts = eventsForDate(dstr);
    const isToday = dstr===today, isSel = dstr===selected;
    const cls=(isToday?'today ':'')+(isSel?'sel ':'');
    const dn = isToday ? `<div class="dn tn">${d}</div>` : `<div class="dn">${d}</div>`;
    const shown = evts.slice(0,3).map(e=>`<div class="ep ${e.type}${e.completed?' done':''}">${e.title}</div>`).join('');
    const more = evts.length>3?`<div class="more">+${evts.length-3} more</div>`:'';
    cells+=`<div class="mc ${cls}" data-pick="${dstr}">${dn}<div class="mc-evts">${shown}${more}</div></div>`;
  }
  // Next month filler
  const total = start+days;
  const rem = total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++){
    const nm=m===11?1:m+2, ny=m===11?y+1:y;
    const dstr=`${ny}-${pad(nm)}-${pad(d)}`;
    cells+=`<div class="mc om" data-pick="${dstr}"><div class="dn">${d}</div></div>`;
  }

  return `<div class="mv fi-anim"><div class="mv-dows">${dows}</div><div class="mv-grid">${cells}</div></div>`;
}

// ── Render: Week View ─────────────────────────────────────────────────────────
function renderWeekView() {
  const w0 = startOfWeek(state.cursor), today = todayStr();
  const days = Array.from({length:7},(_,i)=>addDays(w0,i));

  const head = `<div class="wv-head"><div></div>${days.map(d=>{
    const dstr=ds(d), isT=dstr===today;
    return `<div class="wv-hcell" data-pick="${dstr}">
      <div class="wv-dow${isT?' today':''}">${shortDay(d.getDay())}</div>
      <div class="wv-dnum${isT?' today':''}">${d.getDate()}</div>
    </div>`;
  }).join('')}</div>`;

  // All-day row
  const allDay = `<div class="wv-allday"><div class="wv-ad-lbl">ALL DAY</div>${days.map(d=>{
    const evts = eventsForDate(ds(d)).filter(e=>!e.time);
    return `<div class="wv-ad-cell">${evts.map(e=>`<div class="ep ${e.type}" title="${e.title}">${e.title}</div>`).join('')}</div>`;
  }).join('')}</div>`;

  // Now find current time for indicator
  const now = new Date(), nowMin = now.getHours()*60+now.getMinutes();
  const todayInView = days.findIndex(d=>ds(d)===today);

  // Time grid — 24 hours
  let timeSlots = '';
  for(let h=0;h<24;h++) {
    const lbl = h===0?'12 AM':h<12?`${h} AM`:h===12?'12 PM':`${h-12} PM`;
    const cols = days.map((d,ci)=>{
      const evts = eventsForDate(ds(d)).filter(e=>{
        if(!e.time) return false;
        const [eh]=e.time.split(':').map(Number);
        return eh===h;
      });
      const evtHtml = evts.map(e=>{
        const [eh,em]=e.time.split(':').map(Number);
        const top = em/60*50;
        let dur = 50; // default 1hr
        if(e.endTime){const[eh2,em2]=e.endTime.split(':').map(Number);dur=Math.max(20,(eh2*60+em2-(eh*60+em))/60*50);}
        return `<div class="wv-evt ${e.type}" style="top:${top}px;height:${dur}px" data-edit="${e.id}" title="${e.title}">${e.title}</div>`;
      }).join('');
      // now-line
      const nl = (ci===todayInView && nowMin>=h*60 && nowMin<(h+1)*60)
        ? `<div class="now-line" style="top:${(nowMin-h*60)/60*50}px"></div>` : '';
      return `<div class="wv-col" style="position:relative">${evtHtml}${nl}<div class="wv-hcell-time"></div></div>`;
    }).join('');
    timeSlots += `<div class="wv-tlbl"><div class="tl">${lbl}</div></div>${cols}`;
  }

  return `<div class="wv fi-anim">${head}${allDay}<div class="wv-body"><div class="wv-inner">${timeSlots}</div></div></div>`;
}

// ── Render: Day View ──────────────────────────────────────────────────────────
function renderDayView() {
  const dstr = state.selected || ds(state.cursor), today = todayStr();
  const d = pd(dstr);
  const allDayEvts = eventsForDate(dstr).filter(e=>!e.time);
  const now = new Date(), nowMin = now.getHours()*60+now.getMinutes();
  const isToday = dstr===today;

  const adRow = `<div class="dv-allday">
    <div class="dv-ad-l">ALL DAY</div>
    <div class="dv-ad-items">${allDayEvts.map(e=>`<div class="ep ${e.type}" data-edit="${e.id}">${e.title}</div>`).join('')}</div>
  </div>`;

  let timeSlots = '', colEvts = '';
  for(let h=0;h<24;h++){
    const lbl = h===0?'12 AM':h<12?`${h} AM`:h===12?'12 PM':`${h-12} PM`;
    timeSlots += `<div class="wv-tlbl"><div class="tl">${lbl}</div></div>`;
    const evts = eventsForDate(dstr).filter(e=>{ if(!e.time)return false;const[eh]=e.time.split(':').map(Number);return eh===h; });
    const nl = (isToday && nowMin>=h*60 && nowMin<(h+1)*60)
      ? `<div class="now-line" style="top:${(nowMin-h*60)/60*50}px"></div>` : '';
    const evtHtml = evts.map(e=>{
      const[,em]=e.time.split(':').map(Number);
      const top=em/60*50;
      let dur=50;if(e.endTime){const[eh2,em2]=e.endTime.split(':').map(Number);const[eh]=e.time.split(':').map(Number);dur=Math.max(20,(eh2*60+em2-(eh*60+em))/60*50);}
      return `<div class="wv-evt ${e.type}" style="top:${top}px;height:${dur}px;left:4px;right:4px" data-edit="${e.id}">${e.title}${e.time?`<br><span style="font-size:8px;opacity:.7">${fmtTime(e.time)}</span>`:''}</div>`;
    }).join('');
    colEvts += `<div class="dv-col">${evtHtml}${nl}<div class="wv-hcell-time"></div></div>`;
    timeSlots += colEvts; colEvts='';
  }

  return `<div class="dv fi-anim">
    <div class="dv-head">
      <div class="dv-dn">${dayName(d)}</div>
      <div class="dv-num${isToday?' t':''}">${d.getDate()}</div>
    </div>
    <div class="dv-body">${adRow.replace('dv-allday','dv-allday" style="grid-column:1/-1')}<div class="wv-tlbl"></div><div style="height:1px"></div>${timeSlots}</div>
  </div>`;
}

// ── Render: Year View ─────────────────────────────────────────────────────────
function renderYearView() {
  const y = state.cursor.getFullYear(), today = todayStr();
  const months = Array.from({length:12},(_,m)=>{
    const name = monthName(m).toUpperCase().slice(0,3) + ' ' + monthName(m).slice(3);
    const first = new Date(y,m,1).getDay(), days = daysInMonth(y,m+1);
    const start = first===0?6:first-1;
    const dows = 'MTWTFSS'.split('').map(d=>`<div class="ydow">${d}</div>`).join('');
    let cells = '';
    for(let i=0;i<start;i++) cells+=`<div class="yd ye"></div>`;
    for(let d=1;d<=days;d++){
      const dstr=`${y}-${pad(m+1)}-${pad(d)}`;
      const isT=dstr===today, he=hasEvents(dstr);
      cells+=`<div class="yd${isT?' yt':''}${he?' yhe':''}${(d+start-1)%7>=5?' yo':''}" data-pick="${dstr}">${d}</div>`;
    }
    return `<div class="ym"><div class="ym-title">${monthName(m)} ${y}</div><div class="ym-grid">${dows}${cells}</div></div>`;
  }).join('');
  return `<div class="yv fi-anim"><div class="yv-grid">${months}</div></div>`;
}

// ── Render: Day Panel ──────────────────────────────────────────────────────────
function renderDayPanel() {
  const sel = state.selected;
  if(!sel) return '';
  const evts = eventsForDate(sel);
  const d = pd(sel);
  const items = evts.length ? evts.map(e=>`<div class="di ${e.type}${e.completed?' done-item':''}">
    <div class="di-title${e.completed?' done':''}">${e.type==='birthday'?'🎂 ':''}${e.title}</div>
    <div class="di-meta">${e.type}${e.time?` · ${fmtTime(e.time)}`:''}${e.description?` · ${e.description.slice(0,40)}`:''}${e.repeat&&e.repeat!=='none'?` · repeats ${e.repeat}`:''}</div>
    <div class="di-acts">
      ${e.type==='task'?`<button class="da done-btn" data-toggle="${e.id}">${e.completed?'↺ Undo':'✓ Done'}</button>`:''}
      <button class="da edit-btn" data-edit="${e.id}">Edit</button>
      <button class="da del-btn" data-del="${e.id}">Delete</button>
    </div>
  </div>`).join('') : `<div class="dp-empty">Nothing scheduled</div>`;

  return `<div class="dp fi-anim">
    <div class="dp-head">
      <div class="dp-date">${fmtDate(sel)}</div>
      <div class="dp-dow">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]}</div>
    </div>
    <div class="dp-evts">${items}</div>
    <div class="dp-add"><button class="dp-add-btn" data-action="add-on-date" data-date="${sel}">＋ Add to this day</button></div>
  </div>`;
}

// ── Render: Modal ─────────────────────────────────────────────────────────────
function renderModal() {
  const {modal} = state;
  if(!modal) return '';
  const {mode,data} = modal;
  const t = data.type||'event';
  const types = ['task','event','birthday','holiday'];
  const typeRow = types.map(tp=>`<div class="topt ${tp}${t===tp?' act':''}" data-mtype="${tp}">${tp.charAt(0).toUpperCase()+tp.slice(1)}</div>`).join('');

  const showRepeat = t==='birthday'||t==='holiday';
  const defaultRepeat = showRepeat?'yearly':'none';

  return `<div class="overlay" id="modal-overlay">
  <div class="modal fi-anim">
    <div class="m-ttl">${mode==='add'?'New Entry':'Edit Entry'}</div>
    <div class="fr">
      <label class="fl2">Type</label>
      <div class="type-row">${typeRow}</div>
    </div>
    <div class="fr">
      <label class="fl2">Title *</label>
      <input id="m-title" class="fi" placeholder="Enter title…" value="${(data.title||'').replace(/"/g,'&quot;')}" required>
    </div>
    <div class="fr2">
      <div class="fr" style="margin:0">
        <label class="fl2">Date *</label>
        <input id="m-date" class="fi" type="date" value="${data.date||todayStr()}">
      </div>
      <div class="fr" style="margin:0">
        <label class="fl2">Time <span style="color:var(--dim)">(optional)</span></label>
        <input id="m-time" class="fi" type="time" value="${data.time||''}">
      </div>
    </div>
    ${t==='event'?`<div class="fr2">
      <div class="fr" style="margin:0"><label class="fl2">End Date</label><input id="m-enddate" class="fi" type="date" value="${data.endDate||''}"></div>
      <div class="fr" style="margin:0"><label class="fl2">End Time</label><input id="m-endtime" class="fi" type="time" value="${data.endTime||''}"></div>
    </div>`:''}
    <div class="fr">
      <label class="fl2">Description <span style="color:var(--dim)">(optional)</span></label>
      <textarea id="m-desc" class="fta" placeholder="Add notes…">${data.description||''}</textarea>
    </div>
    <div class="fr">
      <label class="fl2">Repeat</label>
      <select id="m-repeat" class="fs">
        <option value="none"${(data.repeat||defaultRepeat)==='none'?' selected':''}>Does not repeat</option>
        <option value="weekly"${data.repeat==='weekly'?' selected':''}>Weekly</option>
        <option value="monthly"${data.repeat==='monthly'?' selected':''}>Monthly</option>
        <option value="yearly"${(data.repeat==='yearly'||(!data.repeat&&showRepeat))?' selected':''}>Yearly</option>
      </select>
    </div>
    <div class="m-foot">
      ${mode==='edit'?`<button class="m-del" data-action="modal-delete">Delete</button>`:''}
      <button class="m-cancel" data-action="modal-cancel">Cancel</button>
      <button class="m-save" data-action="modal-save">Save</button>
    </div>
  </div></div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const {view,selected} = state;
  const showDP = selected && (view==='month'||view==='year');
  document.getElementById('app').innerHTML =
    renderHeader() +
    renderFilterBar() +
    `<div class="content">
      ${renderSidebar()}
      <div class="main">
        <div class="view-area">${
          view==='month' ? renderMonthView() :
          view==='week'  ? renderWeekView()  :
          view==='day'   ? renderDayView()   :
                           renderYearView()
        }</div>
        ${showDP ? renderDayPanel() : ''}
      </div>
    </div>` +
    renderModal();
  updateClock();
  if(view==='week'||view==='day'){
    // Scroll to 7am
    const body=document.querySelector('.wv-body,.dv-body');
    if(body) body.scrollTop=7*50;
  }
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const el = document.getElementById('clock');
  if(!el) return;
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
  const ampm=h<12?'AM':'PM', hr=h%12||12;
  el.textContent=`${hr}:${pad(m)}:${pad(s)} ${ampm}`;
}
setInterval(updateClock, 1000);

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(dir) {
  const c = state.cursor, v = state.view;
  const d = new Date(c);
  if(v==='month') d.setMonth(d.getMonth()+dir);
  else if(v==='week') d.setDate(d.getDate()+dir*7);
  else if(v==='day') d.setDate(d.getDate()+dir);
  else if(v==='year') d.setFullYear(d.getFullYear()+dir);
  state.cursor = d;
  render();
}
function goToday() {
  state.cursor = new Date();
  state.selected = todayStr();
  render();
}

// ── Modal helpers ──────────────────────────────────────────────────────────────
function openAdd(date='', type='event') {
  state.modal = {mode:'add', data:{id:uid(),type,title:'',date:date||todayStr(),time:null,endDate:null,endTime:null,description:'',repeat:type==='birthday'||type==='holiday'?'yearly':'none',completed:false}};
  render();
}
function openEdit(id) {
  const e = EVENTS.find(x=>x.id===id);
  if(!e) return;
  state.modal = {mode:'edit', data:{...e}};
  render();
}
function closeModal() { state.modal=null; render(); }
function saveModal() {
  const t = document.querySelector('.topt.act');
  const type = t?t.dataset.mtype:'event';
  const title = document.getElementById('m-title')?.value.trim();
  const date  = document.getElementById('m-date')?.value;
  if(!title||!date) { document.getElementById('m-title')?.focus(); return; }
  const time    = document.getElementById('m-time')?.value||null;
  const endDate = document.getElementById('m-enddate')?.value||null;
  const endTime = document.getElementById('m-endtime')?.value||null;
  const desc    = document.getElementById('m-desc')?.value.trim()||'';
  const repeat  = document.getElementById('m-repeat')?.value||'none';
  const {modal} = state;
  const obj = {...modal.data, type, title, date, time:time||null, endDate:endDate||null, endTime:endTime||null, description:desc, repeat};
  if(modal.mode==='add') EVENTS.push(obj);
  else { const i=EVENTS.findIndex(x=>x.id===obj.id); if(i>=0) EVENTS[i]=obj; }
  saveEvents();
  state.selected = date;
  closeModal();
}
function deleteEvt(id) {
  EVENTS = EVENTS.filter(e=>e.id!==id);
  saveEvents();
  state.modal=null;
  render();
}
function toggleComplete(id) {
  const e=EVENTS.find(x=>x.id===id);
  if(e){e.completed=!e.completed;saveEvents();render();}
}
function setModalType(tp) {
  if(state.modal){ state.modal.data.type=tp; render(); }
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const t = e.target.closest('[data-action],[data-view],[data-filter],[data-pick],[data-edit],[data-del],[data-toggle],[data-mtype]');
  if(!t) return;

  if(t.dataset.action) {
    const a = t.dataset.action;
    if(a==='prev') navigate(-1);
    else if(a==='next') navigate(1);
    else if(a==='today') goToday();
    else if(a==='add') openAdd(state.selected||'');
    else if(a==='add-on-date') openAdd(t.dataset.date);
    else if(a==='modal-cancel'||t.id==='modal-overlay') closeModal();
    else if(a==='modal-save') saveModal();
    else if(a==='modal-delete') { if(state.modal) deleteEvt(state.modal.data.id); }
    else if(a==='mini-prev') { const mc=new Date(state.miniCursor);mc.setMonth(mc.getMonth()-1);state.miniCursor=mc;render(); }
    else if(a==='mini-next') { const mc=new Date(state.miniCursor);mc.setMonth(mc.getMonth()+1);state.miniCursor=mc;render(); }
    else if(a==='print') window.print();
    return;
  }
  if(t.dataset.view) { state.view=t.dataset.view;render();return; }
  if(t.dataset.filter) { state.filters[t.dataset.filter]=!state.filters[t.dataset.filter];render();return; }
  if(t.dataset.pick) {
    const dstr=t.dataset.pick;
    state.selected=dstr;
    if(state.view==='year'){
      const d=pd(dstr);state.cursor=d;state.view='month';
    } else if(state.view==='month') {
      // if other-month day, navigate there
      const d=pd(dstr);
      if(d.getMonth()!==state.cursor.getMonth()||d.getFullYear()!==state.cursor.getFullYear()){
        state.cursor=new Date(d.getFullYear(),d.getMonth(),1);
      }
    } else if(state.view==='week'||state.view==='day') {
      state.cursor=pd(dstr);
    }
    // mini-cal sync
    const pd2=pd(dstr);state.miniCursor=new Date(pd2.getFullYear(),pd2.getMonth(),1);
    render();return;
  }
  if(t.dataset.edit) { openEdit(t.dataset.edit);return; }
  if(t.dataset.del)  { deleteEvt(t.dataset.del);return; }
  if(t.dataset.toggle) { toggleComplete(t.dataset.toggle);return; }
  if(t.dataset.mtype)  { setModalType(t.dataset.mtype);return; }

  // Click on overlay background to close
  if(t.id==='modal-overlay') closeModal();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.key==='Escape') { if(state.modal){closeModal();return;} }
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='ArrowLeft')  navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
  if(e.key==='t') goToday();
  if(e.key==='m') { state.view='month';render(); }
  if(e.key==='w') { state.view='week'; render(); }
  if(e.key==='d') { state.view='day';  render(); }
  if(e.key==='y') { state.view='year'; render(); }
  if(e.key==='n'||e.key==='+') openAdd(state.selected||'');
  if(e.key==='Enter'&&state.modal) saveModal();
});

// Init
render();
</script>
</body>
</html>
